name: Archie Intent Review
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  intent-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # Trust model: intent_review.py is executed from the BASE ref copy
      # (origin/${GITHUB_BASE_REF}), never from PR-head content. A same-repo
      # branch contributor cannot edit the script that runs with secrets, so
      # PR-head edits can't achieve arbitrary code execution. `pull_request`
      # (NOT pull_request_target) + least-priv permissions are kept. With
      # fetch-depth: 0 above, origin/${GITHUB_BASE_REF} is present in history
      # and the script still diffs against the PR base SHA directly.
      - name: Run Archie Intent Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: |
          SCRIPT=".archie/intent_review.py"
          if git cat-file -e "origin/${GITHUB_BASE_REF}:$SCRIPT" 2>/dev/null; then
            git show "origin/${GITHUB_BASE_REF}:$SCRIPT" > /tmp/archie_intent_review.py
            python3 /tmp/archie_intent_review.py
          else
            echo "[archie] $SCRIPT not present on base ref, skipping."
          fi

      # Delivery review: reconciles intent (PR title/body) + blueprint + diff into
      # a "built the intent? / broke anything?" verdict. Same trust model as above —
      # executed from the BASE ref copy, never PR-head content. Non-blocking: it
      # posts an FYI comment and always exits 0 (never fails the check).
      - name: Run Archie Delivery Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          if git cat-file -e "origin/${GITHUB_BASE_REF}:.archie/delivery_review.py" 2>/dev/null; then
            rm -rf /tmp/archie-base && mkdir -p /tmp/archie-base
            git archive "origin/${GITHUB_BASE_REF}" .archie | tar -x -C /tmp/archie-base
            python3 /tmp/archie-base/.archie/delivery_review.py
          else
            echo "[archie] .archie/delivery_review.py not present on base ref, skipping."
          fi
