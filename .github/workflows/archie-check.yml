name: Archie Architecture Check
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  archie-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
      - run: archie check
      # Trust model: delivery_review.py is executed from the TRUSTED installed
      # location (.archie/), not from PR-editable content. The [ -f ] guard
      # below ensures we only run the pre-installed script, never attacker-
      # controlled code from the PR branch. On fork PRs secrets are empty and
      # the review posts no comment — fail-open is the intended behavior.
      - run: |
          if [ -f .archie/delivery_review.py ]; then
            python3 .archie/delivery_review.py
          else
            echo "[archie] .archie/delivery_review.py not installed, skipping."
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
